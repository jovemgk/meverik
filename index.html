<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Capitã Marvel - Horizontal Expandido</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card-container">
    <div class="card-background"></div>
    
    <div class="card-info">
      <h2>Capitã Marvel</h2>
      <p class="real-name">Carol Danvers</p>
      <p class="desc">A história da Capitã Marvel (Carol Danvers) acompanha a jornada de uma ex-piloto da Força Aérea dos EUA que ganha habilidades cósmicas após ser exposta à explosão de uma tecnologia alienígena.</p>
    </div>

    <img src="1.png" alt="Capitã Marvel" class="card-imagem">
  </div>

</body>
</html>
